<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KVQTool-Web — Workspace</title>
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow@0.0.60/dist/drawflow.min.css">
  <script src="https://cdn.jsdelivr.net/npm/drawflow@0.0.60/dist/drawflow.min.js"></script>
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
</head>
<body>
  <header class="top-bar">
    <a href="/" class="logo">KVQTool-Web</a>
    <span id="project-name" class="project-title"></span>
    <nav class="toolbar"><button class="btn" onclick="showView('player')">Player</button><button class="btn" onclick="toggleWorkflowPanel()">Workflows</button></nav>
  </header>

  <div class="workspace">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-header">
          <span>Resources</span>
          <button class="btn btn-sm" onclick="refreshSidebar()" title="Refresh">↻</button>
          <button class="btn btn-sm" id="add-resource-btn">+</button>
          <div class="dropdown" id="add-dropdown" style="display:none">
            <button onclick="triggerUpload()">Upload Media</button>
          </div>
        </div>
        <div id="folder-tree" hx-indicator="#sidebar-loading">
          <div id="sidebar-loading" class="htmx-indicator">Loading...</div>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-header">
          <span>Workflows</span>
          <button class="btn btn-sm" onclick="refreshSidebar()" title="Refresh">↻</button>
          <button class="btn btn-sm" onclick="toggleWorkflowPanel()">+</button>
        </div>
        <div id="workflow-list"></div>
      </div>
    </aside>

    <main class="canvas" id="main-canvas">
      <div id="video-analysis-player" class="vap" style="display:none">
        <div class="vap-viewport" onclick="vapViewportClick(event)">
          <video id="vap-video-left" class="vap-video" playsinline></video>
          <video id="vap-video-right" class="vap-video vap-video-right" playsinline style="display:none"></video>
          <div id="vap-divider" class="vap-divider" style="display:none"></div>
          <canvas id="vap-canvas" class="vap-canvas" style="display:none"></canvas>
          <div id="vap-metric-overlay" class="vap-metric-hud"></div>
        </div>
        <div class="vap-controls" id="vap-controls">
          <div class="vap-controls-row">
            <button class="vap-btn" id="vap-play-btn" onclick="vapTogglePlay()">Play</button>
            <input type="range" id="vap-seekbar" class="vap-seekbar" min="0" max="1000" value="0" oninput="vapSeek(this.value)">
            <span id="vap-timecode" class="vap-timecode">00:00:00:00</span>
          </div>
          <div class="vap-controls-row vap-controls-secondary">
            <button class="vap-btn" onclick="vapStepFrame(-1)">Prev</button>
            <span id="vap-frame-counter" class="vap-frame-counter">Frame: 0</span>
            <button class="vap-btn" onclick="vapStepFrame(1)">Next</button>
            <span class="vap-separator"></span>
            <button class="vap-btn" id="vap-framestep-btn" onclick="vapToggleFrameMode()">Frame Step</button>
            <button class="vap-btn" id="vap-split-btn" onclick="vapToggleSplit()">Split View</button>
            <button class="vap-btn" id="vap-fullscreen-btn" onclick="vapToggleFullscreen()">Fullscreen</button>
            <button class="vap-btn vap-collapse-btn" onclick="vapToggleControls()">Hide</button>
          </div>
        </div>
        <div class="vap-controls-nub" id="vap-controls-nub" style="display:none" onclick="vapToggleControls()"></div>
        <div id="vap-pool" class="vap-pool" style="display:none">
          <div class="vap-pool-header">
            <span>Comparison Pool</span>
          </div>
          <div id="vap-pool-items"></div>
          <div class="vap-pool-selectors">
            <label>Left <select id="vap-left-select" onchange="vapSetLeft(this.value)"></select></label>
            <label>Right <select id="vap-right-select" onchange="vapSetRight(this.value)"></select></label>
          </div>
          <details class="vap-offsets">
            <summary>Frame Offsets</summary>
            <div id="vap-offset-controls"></div>
          </details>
        </div>
      </div>

      <div id="panel-workflow" class="panel" style="display:none">
        <div class="wf-toolbar">
          <button class="btn btn-sm" onclick="newWorkflow()">New</button>
          <button class="btn btn-sm btn-primary" onclick="saveWorkflow()">Save</button>
          <button class="btn btn-sm" onclick="runWorkflow()">Run</button>
          <select id="wf-load-select" onchange="loadSelectedWorkflow(this.value)">
            <option value="">-- Load Workflow --</option>
          </select>
        </div>
        <div class="wf-body">
          <div id="wf-node-menu" class="wf-node-menu" style="display:none">
            <button onclick="addWorkflowNode('ResourceDownload')">Resource Download</button>
            <button onclick="addWorkflowNode('GStreamerEncode')">x264 Encode</button>
            <button onclick="addWorkflowNode('GStreamerMetrics')">Metrics Analysis</button>
            <button onclick="addWorkflowNode('ResourceUpload')">Resource Upload</button>
            <button onclick="addWorkflowNode('SplitVideo')">Split Video</button>
            <button onclick="addWorkflowNode('ConcatVideo')">Concat Video</button>
            <button onclick="addWorkflowNode('GenerateReport')">Generate Report</button>
            <button onclick="addWorkflowNode('RemoteEncodeX264')">Remote x264 Encode</button>
            <button onclick="addWorkflowNode('FragmentedMP4Repackage')">fMP4 Repackage</button>
          </div>
          <div class="wf-palette" id="wf-palette">
            <div class="wf-palette-title">Nodes</div>
            <button class="wf-palette-item" draggable="true" ondragstart="onNodeDragStart(event,'ResourceDownload')">Resource Download</button>
            <button class="wf-palette-item" draggable="true" ondragstart="onNodeDragStart(event,'GStreamerEncode')">x264 Encode</button>
            <button class="wf-palette-item" draggable="true" ondragstart="onNodeDragStart(event,'GStreamerMetrics')">Metrics</button>
            <button class="wf-palette-item" draggable="true" ondragstart="onNodeDragStart(event,'ResourceUpload')">Resource Upload</button>
            <button class="wf-palette-item" draggable="true" ondragstart="onNodeDragStart(event,'SplitVideo')">Split Video</button>
            <button class="wf-palette-item" draggable="true" ondragstart="onNodeDragStart(event,'ConcatVideo')">Concat Video</button>
            <button class="wf-palette-item" draggable="true" ondragstart="onNodeDragStart(event,'GenerateReport')">Gen Report</button>
            <button class="wf-palette-item" draggable="true" ondragstart="onNodeDragStart(event,'RemoteEncodeX264')">Remote x264</button>
            <button class="wf-palette-item" draggable="true" ondragstart="onNodeDragStart(event,'FragmentedMP4Repackage')">fMP4 Repack</button>
          </div>
          <div id="drawflow-container"></div>
        </div>
      </div>

      <div id="panel-empty" class="panel">
        <p>Double-click a media resource to open the player.</p>
      </div>
    </main>
  </div>

  <footer class="status-bar">
    <div id="job-progress"></div>
  </footer>

  <dialog id="upload-dialog">
    <form onsubmit="return false;">
      <h3>Upload Media</h3>
      <div id="upload-file-list"></div>
      <label class="upload-option">
        <input type="checkbox" id="repackage-fmp4"> Repackage as fragmented MP4 (streamable)
      </label>
      <div class="dialog-actions">
        <button type="button" onclick="this.closest('dialog').close()">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="vapConfirmUpload()">Upload</button>
      </div>
    </form>
  </dialog>

  <dialog id="confirm-switch-dialog">
    <form onsubmit="return false;">
      <h3>Switch Media</h3>
      <p>Close current player and open new media?</p>
      <div class="dialog-actions">
        <button type="button" onclick="this.closest('dialog').close()">Cancel</button>
        <button type="button" class="btn btn-primary" id="confirm-switch-btn">Switch</button>
      </div>
    </form>
  </dialog>

  <input type="file" id="file-upload-input" accept="video/mp4" multiple style="display:none" onchange="handleFileSelect(this)">

  <script type="module" src="/js/app.js"></script>
</body>
</html>
